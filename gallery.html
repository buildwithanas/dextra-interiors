<!DOCTYPE html>
<html lang="en">
<head>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="icon" type="images/jpeg" href="images/o.jpeg">

</head>
<body>


<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon">
        <img src="images/o.jpeg" alt="Dextra Interiors logo">
      </div>
      <div class="nav-logo-text"><strong>Dextra Interiors</strong></div>
    </a>

    <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation menu" aria-expanded="false" aria-controls="navMenu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <ul id="navMenu">
      <li><a href="index.html" class="active">Home</a></li>
      <li><a href="gallery.html" class="active">Gallery</a></li>
      <li><a href="services.html" class="active">Services</a></li>

  </div>
</nav>

<div class="header">

  <p>Take a journey through our portfolio and discover the unique artworks and commissioned pieces we've brought to life.</p>
</div>

<div class="intro">
  <h3>My Gallery</h3>
</div>

<div class="gallery reveal">
  <img src="images/a.jpeg" class="images" alt="Dextra Interiors gallery piece">
  <img src="images/b.jpeg" class="images" alt="Dextra Interiors gallery piece">
  <img src="images/c.jpeg" class="images" alt="Dextra Interiors gallery piece">
  <img src="images/d.jpeg" class="images" alt="Dextra Interiors gallery piece">
  <img src="images/e.jpeg" class="images" alt="Dextra Interiors gallery piece">
  <img src="images/f.jpeg" class="images" alt="Dextra Interiors gallery piece">
  <img src="images/g.jpeg" class="images" alt="Dextra Interiors gallery piece">
  <img src="images/h.jpeg" class="images" alt="Dextra Interiors gallery piece">
  <img src="images/i.jpeg" class="images" alt="Dextra Interiors gallery piece">
  <img src="images/j.jpeg" class="images" alt="Dextra Interiors gallery piece">
  <img src="images/k.jpeg" class="images" alt="Dextra Interiors gallery piece">
  <img src="images/l.jpeg" class="images" alt="Dextra Interiors gallery piece">
  <img src="images/m.jpeg" class="images" alt="Dextra Interiors gallery piece">

  <img src="images/y.jpeg" class="images" alt="Dextra Interiors gallery piece">
</div>

<script>
  // Mobile nav toggle
  const navToggle = document.getElementById('navToggle');
  const navMenu = document.getElementById('navMenu');

  navToggle.addEventListener('click', () => {
    const isOpen = navMenu.classList.toggle('open');
    navToggle.classList.toggle('open', isOpen);
    navToggle.setAttribute('aria-expanded', isOpen);
  });

  navMenu.querySelectorAll('a').forEach(link => {
    link.addEventListener('click', () => {
      navMenu.classList.remove('open');
      navToggle.classList.remove('open');
      navToggle.setAttribute('aria-expanded', 'false');
    });
  });

  // Scroll reveal
  document.addEventListener('DOMContentLoaded', () => {
    const revealEls = document.querySelectorAll('.reveal');
    if (!('IntersectionObserver' in window)) {
      revealEls.forEach(el => el.classList.add('reveal-active'));
      return;
    }
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('reveal-active');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.15 });
    revealEls.forEach(el => observer.observe(el));
  });
</script>
</body>
</html>
